services:
  - type: web
    name: mithya-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    plan: free
    healthCheckPath: /api/voice/posts
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: ADMIN_PASSWORD
        sync: false
      - key: MONGO_URI
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
